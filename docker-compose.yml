services:

  backend:
    build: ./backend
    container_name: fraud-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/storage
    networks:
      - fraud-net

  frontend:
    build: ./frontend
    container_name: fraud-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - ./storage:/storage
    networks:
      - fraud-net

networks:
  fraud-net:
    driver: bridge